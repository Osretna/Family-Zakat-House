<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بيت زكاة العائلة - لوحة التحكم</title>
  <style>
    body {
      font-family: "Tahoma", sans-serif;
      background: #f4f7f6;
      direction: rtl;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    header {
      background: #2c3e50;
      color: white;
      padding: 20px;
    }
    .container {
      margin: 30px auto;
      max-width: 700px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
    }
    input, select, button {
      padding: 12px;
      margin: 10px;
      border-radius: 5px;
      border: 1px solid #ddd;
      width: 90%;
      box-sizing: border-box;
    }
    button {
      background: #27ae60;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    button:hover { background: #219150; }
    
    /* تنسيق قسم تسجيل الدخول */
    #login-section {
      margin-top: 50px;
    }
    
    /* إخفاء لوحة التحكم في البداية */
    #admin-panel {
      display: none;
    }

    .donations { margin-top: 20px; text-align: right; }
    .donations ul { list-style: none; padding: 0; }
    .donations li {
      background: #f9f9f9;
      margin: 8px 0;
      padding: 12px;
      border-right: 5px solid #27ae60;
      border-radius: 5px;
      font-size: 0.9em;
    }
    .summary {
      margin-top: 20px;
      background: #eef2f3;
      padding: 15px;
      border-radius: 8px;
    }
    .logout-btn {
        background: #e74c3c;
        width: auto;
        padding: 5px 15px;
        float: left;
    }
  </style>
</head>
<body>

  <header>
    <h1>بيت زكاة العائلة</h1>
    <p>لوحة إدارة المساهمات</p>
  </header>

  <!-- قسم تسجيل الدخول -->
  <div id="login-section" class="container">
    <h2>تسجيل دخول الإدارة</h2>
    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
    <p id="login-error" style="color: red; display: none;">خطأ في البيانات، حاول مجدداً</p>
  </div>

  <!-- لوحة التحكم (تظهر بعد تسجيل الدخول) -->
  <div id="admin-panel" class="container">
    <button class="logout-btn" onclick="logout()">خروج</button>
    <div style="clear: both;"></div>
    
    <h2>إضافة مساهمة جديدة</h2>
    <input type="text" id="name" placeholder="اسم المتبرع">
    <input type="number" id="amount" placeholder="المبلغ (بالجنيه)">
    <select id="purpose">
      <option value="دعم أسرة محتاجة">دعم أسرة محتاجة</option>
      <option value="علاج مريض">علاج مريض</option>
      <option value="تعليم طالب">تعليم طالب</option>
      <option value="مشاريع خيرية عامة">مشاريع خيرية عامة</option>
    </select>
    <button onclick="addDonation()">حفظ وإضافة</button>

    <hr>

    <div class="donations">
      <h3>السجل التاريخي للمساهمات:</h3>
      <ul id="donationList"></ul>
      <h3>إجمالي المبلغ الكلي: <span id="total">0</span> جنيه</h3>
    </div>

    <div class="summary">
      <h3>توزيع الأموال حسب الوجهة:</h3>
      <ul id="summaryList"></ul>
    </div>
  </div>

  <script type="module">
    // 🔹 إعدادات Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyADnzvRAhqDbbFjPiqF-vQvy9bqITv4xTk",
      authDomain: "zakat-d5292.firebaseapp.com",
      projectId: "zakat-d5292",
      storageBucket: "zakat-d5292.firebasestorage.app",
      messagingSenderId: "574981468354",
      appId: "1:574981468354:web:e29d549d34c522de334b5b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // دالة تسجيل الدخول
    window.login = function() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;

      if (user === "admin" && pass === "123456") {
        document.getElementById("login-section").style.display = "none";
        document.getElementById("admin-panel").style.display = "block";
        loadData(); // تحميل البيانات عند الدخول الناجح
      } else {
        document.getElementById("login-error").style.display = "block";
      }
    }

    // دالة الخروج
    window.logout = function() {
        location.reload(); // إعادة تحميل الصفحة للخروج
    }

    // دالة إضافة تبرع
    window.addDonation = async function() {
      const name = document.getElementById("name").value;
      const amount = parseFloat(document.getElementById("amount").value);
      const purpose = document.getElementById("purpose").value;

      if(name && amount > 0) {
        try {
          await addDoc(collection(db, "donations"), {
            name: name,
            amount: amount,
            purpose: purpose,
            date: new Date()
          });
          alert("تم الحفظ بنجاح");
          loadData(); // إعادة تحميل القائمة بعد الإضافة
          
          document.getElementById("name").value = "";
          document.getElementById("amount").value = "";
        } catch (e) {
          console.error("خطأ أثناء الحفظ: ", e);
          alert("حدث خطأ أثناء الاتصال بقاعدة البيانات");
        }
      } else {
        alert("يرجى ملء البيانات بشكل صحيح");
      }
    }

    // دالة جلب البيانات من Firebase وعرضها
    async function loadData() {
      const donationList = document.getElementById("donationList");
      const summaryList = document.getElementById("summaryList");
      donationList.innerHTML = "جاري التحميل...";
      
      let total = 0;
      let summary = {};

      const q = query(collection(db, "donations"), orderBy("date", "desc"));
      const querySnapshot = await getDocs(q);
      
      donationList.innerHTML = "";
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        const li = document.createElement("li");
        li.textContent = `${data.name} - ${data.amount} ج.م (${data.purpose})`;
        donationList.appendChild(li);

        total += data.amount;
        summary[data.purpose] = (summary[data.purpose] || 0) + data.amount;
      });

      document.getElementById("total").textContent = total;

      summaryList.innerHTML = "";
      for (const p in summary) {
        const li = document.createElement("li");
        li.textContent = `${p}: ${summary[p]} جنيه`;
        summaryList.appendChild(li);
      }
    }
  </script>
</body>
</html>
